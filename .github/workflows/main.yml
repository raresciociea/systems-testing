name: Python Unit Tests

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Unit Tests
      run: |
        cd laboratories/cicd-documentation
        python3 -m unittest test_find.py
